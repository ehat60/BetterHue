<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>BetterHue</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Views ===== */
    .view { display: none; height: 100%; flex-direction: column; }
    .view.active { display: flex; }

    /* ===== Room List ===== */
    #rooms-view {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 max(16px, env(safe-area-inset-bottom));
    }

    .rooms-header {
      padding: 48px 24px 16px;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .room-card {
      margin: 8px 16px;
      background: #252525;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .room-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      background: linear-gradient(to right, #FF8F00, #FFB74D);
      opacity: 0.25;
      pointer-events: none;
      transition: width 0.05s linear;
    }

    .room-card.off .room-fill { background: #333; opacity: 0.15; }

    .room-info {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .room-name {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .room-bri {
      font-size: 1.15rem;
      font-weight: 700;
      min-width: 48px;
      text-align: right;
    }

    .room-lights-count {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* ===== Lamp Carousel ===== */
    #lamp-view { touch-action: none; }

    .lamp-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      z-index: 3;
    }

    .back-btn {
      background: none;
      border: none;
      color: #FFB74D;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
      line-height: 1;
    }

    .lamp-header-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    #carousel {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      will-change: transform;
      transition: transform 0.3s ease-out;
    }

    .carousel-track.dragging { transition: none; }

    .lamp-screen {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brightness-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #FF8F00, #FFB74D);
      transition: height 0.05s linear;
      pointer-events: none;
    }

    .lamp-screen.off .brightness-bar { background: #333; }

    .lamp-name {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      z-index: 2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .brightness-text {
      position: relative;
      z-index: 2;
      font-size: 4rem;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px 0 max(16px, env(safe-area-inset-bottom));
      z-index: 2;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active { background: #fff; transform: scale(1.3); }

    /* ===== Onboarding ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.hidden { display: none; }

    .overlay-content {
      text-align: center;
      padding: 32px;
      max-width: 360px;
    }

    .overlay-content h1 { font-size: 2rem; margin-bottom: 12px; }
    .overlay-content p { color: #aaa; margin-bottom: 24px; line-height: 1.5; }

    #onboard-status {
      margin-bottom: 24px;
      font-size: 0.95rem;
      color: #FFB74D;
      min-height: 1.4em;
    }

    #manual-ip {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 12px;
      outline: none;
    }

    #manual-ip:focus { border-color: #FFB74D; }

    #manual-ip-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #FF8F00;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    #manual-ip-btn:active { background: #e68200; }
  </style>
</head>
<body>

  <!-- Room List View -->
  <div id="rooms-view" class="view">
    <div class="rooms-header">Rooms</div>
    <div id="room-list"></div>
  </div>

  <!-- Lamp Carousel View -->
  <div id="lamp-view" class="view">
    <div class="lamp-header">
      <button class="back-btn" id="back-btn">&larr;</button>
      <div class="lamp-header-title" id="lamp-header-title"></div>
    </div>
    <div id="carousel"></div>
    <div id="dots"></div>
  </div>

  <!-- Onboarding -->
  <div id="onboarding" class="overlay">
    <div class="overlay-content">
      <h1>BetterHue</h1>
      <p>Full-screen brightness control for your Hue lights.</p>
      <div id="onboard-status">Searching for bridge...</div>
      <input id="manual-ip" type="text" placeholder="Or enter bridge IP manually">
      <button id="manual-ip-btn">Connect</button>
      <div id="cert-step" style="display:none; margin-top: 20px;">
        <p style="color:#aaa; font-size:0.85rem; margin-bottom:12px;">
          First, accept your bridge's certificate:
        </p>
        <a id="cert-link" href="#" target="_blank" style="
          display:inline-block; padding:10px 20px; background:#333; color:#FFB74D;
          border-radius:8px; text-decoration:none; font-weight:600; margin-bottom:12px;
        ">Open Bridge &rarr;</a>
        <p style="color:#666; font-size:0.8rem;">
          Accept the warning, then come back here and tap Connect.
        </p>
      </div>
    </div>
  </div>

  <script>
    // ===== bridge =====
    var STORAGE_KEY_IP = 'betterhue_bridgeIp';
    var STORAGE_KEY_USER = 'betterhue_username';

    function getSavedCredentials() {
      var bridgeIp = localStorage.getItem(STORAGE_KEY_IP);
      var username = localStorage.getItem(STORAGE_KEY_USER);
      return (bridgeIp && username) ? { bridgeIp: bridgeIp, username: username } : null;
    }

    function saveCredentials(bridgeIp, username) {
      localStorage.setItem(STORAGE_KEY_IP, bridgeIp);
      localStorage.setItem(STORAGE_KEY_USER, username);
    }

    function clearCredentials() {
      localStorage.removeItem(STORAGE_KEY_IP);
      localStorage.removeItem(STORAGE_KEY_USER);
    }

    async function discoverBridge() {
      try {
        var res = await fetch('https://discovery.meethue.com/');
        var data = await res.json();
        if (data.length > 0) return data[0].internalipaddress;
      } catch (e) {}
      return null;
    }

    async function authenticate(bridgeIp) {
      var res = await fetch('https://' + bridgeIp + '/api', {
        method: 'POST',
        body: JSON.stringify({ devicetype: 'betterhue#browser' }),
      });
      var data = await res.json();
      if (data[0] && data[0].success) {
        var username = data[0].success.username;
        saveCredentials(bridgeIp, username);
        return username;
      }
      if (data[0] && data[0].error && data[0].error.type === 101) {
        throw new Error('LINK_BUTTON');
      }
      throw new Error((data[0] && data[0].error && data[0].error.description) || 'Authentication failed');
    }

    async function apiGet(path) {
      var res;
      try {
        res = await fetch('https://' + state.bridgeIp + '/api/' + state.username + path);
      } catch (e) {
        throw new Error('NETWORK_ERROR');
      }
      return await res.json();
    }

    function apiPut(path, body) {
      fetch('https://' + state.bridgeIp + '/api/' + state.username + path, {
        method: 'PUT',
        body: JSON.stringify(body),
      }).catch(function() {});
    }

    async function getRooms() {
      var groups = await apiGet('/groups');
      var lights = await apiGet('/lights');
      var rooms = [];
      Object.entries(groups).forEach(function(entry) {
        var id = entry[0], g = entry[1];
        if (g.type !== 'Room') return;
        var roomLights = g.lights.map(function(lid) {
          var l = lights[lid];
          if (!l) return null;
          return { id: lid, name: l.name, on: l.state.on, bri: l.state.bri, reachable: l.state.reachable };
        }).filter(Boolean);

        // Average brightness of lights that are on
        var onLights = roomLights.filter(function(l) { return l.on; });
        var avgBri = onLights.length > 0
          ? Math.round(onLights.reduce(function(s, l) { return s + l.bri; }, 0) / onLights.length)
          : 0;
        var anyOn = onLights.length > 0;

        rooms.push({
          id: id,
          name: g.name,
          lights: roomLights,
          bri: avgBri,
          on: anyOn,
        });
      });
      return rooms;
    }

    async function setRoomBrightness(roomId, bri) {
      var on = bri > 0;
      var body = on ? { on: true, bri: bri } : { on: false };
      await apiPut('/groups/' + roomId + '/action', body);
    }

    async function setLightBrightness(lightId, bri) {
      var on = bri > 0;
      var body = on ? { on: true, bri: bri } : { on: false };
      await apiPut('/lights/' + lightId + '/state', body);
    }

    // ===== state =====
    var state = {
      bridgeIp: null,
      username: null,
      rooms: [],
      currentView: 'rooms', // 'rooms' | 'lamps'
      currentRoom: null,
      currentIndex: 0,
      startBri: 0,
    };

    // ===== views =====
    var roomsView = document.getElementById('rooms-view');
    var lampView = document.getElementById('lamp-view');

    function showView(name) {
      state.currentView = name;
      roomsView.classList.toggle('active', name === 'rooms');
      lampView.classList.toggle('active', name === 'lamps');
    }

    // ===== room list =====
    var roomListEl = document.getElementById('room-list');

    function renderRooms() {
      roomListEl.innerHTML = state.rooms.map(function(room) {
        var pct = Math.round((room.bri / 254) * 100);
        var isOff = !room.on;
        return '<div class="room-card' + (isOff ? ' off' : '') + '" data-room-id="' + room.id + '">' +
          '<div class="room-fill" style="width: ' + (isOff ? 0 : pct) + '%"></div>' +
          '<div class="room-info">' +
            '<div>' +
              '<div class="room-name">' + room.name + '</div>' +
              '<div class="room-lights-count">' + room.lights.length + ' light' + (room.lights.length !== 1 ? 's' : '') + '</div>' +
            '</div>' +
            '<div class="room-bri">' + (isOff ? 'OFF' : pct + '%') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      // Attach slider + tap to each card
      var cards = roomListEl.querySelectorAll('.room-card');
      cards.forEach(function(card) { initRoomSlider(card); });
    }

    function updateRoomCard(roomId) {
      var room = state.rooms.find(function(r) { return r.id === roomId; });
      if (!room) return;
      var card = roomListEl.querySelector('[data-room-id="' + roomId + '"]');
      if (!card) return;
      var pct = Math.round((room.bri / 254) * 100);
      var isOff = !room.on;
      card.className = 'room-card' + (isOff ? ' off' : '');
      card.querySelector('.room-fill').style.width = (isOff ? 0 : pct) + '%';
      card.querySelector('.room-bri').textContent = isOff ? 'OFF' : pct + '%';
    }

    function initRoomSlider(card) {
      var roomId = card.getAttribute('data-room-id');
      var startX, startBri, moved, lastApi = 0;
      var THROTTLE = 300;

      card.addEventListener('pointerdown', function(e) {
        card.setPointerCapture(e.pointerId);
        startX = e.clientX;
        moved = false;
        sliding = true;
        var room = state.rooms.find(function(r) { return r.id === roomId; });
        startBri = room ? (room.on ? room.bri : 0) : 0;
      });

      card.addEventListener('pointermove', function(e) {
        var dx = e.clientX - startX;
        if (Math.abs(dx) < 8 && !moved) return;
        moved = true;

        // Map drag distance to brightness: full card width = full range (254)
        var cardW = card.offsetWidth;
        var newBri = Math.round(Math.min(254, Math.max(0, startBri + (dx / cardW) * 254)));

        var room = state.rooms.find(function(r) { return r.id === roomId; });
        if (!room) return;
        room.bri = newBri;
        room.on = newBri > 0;
        // Update each light in local state too
        room.lights.forEach(function(l) { l.bri = newBri; l.on = newBri > 0; });
        updateRoomCard(roomId);

        var now = Date.now();
        if (now - lastApi >= THROTTLE) {
          lastApi = now;
          setRoomBrightness(roomId, newBri);
        }
      });

      function endHandler() {
        sliding = false;
        if (moved) {
          var room = state.rooms.find(function(r) { return r.id === roomId; });
          if (room) setRoomBrightness(roomId, room.bri);
        } else {
          openRoom(roomId);
        }
      }

      card.addEventListener('pointerup', endHandler);
      card.addEventListener('pointercancel', endHandler);
    }

    // ===== lamp carousel =====
    var trackEl = null;

    function openRoom(roomId) {
      var room = state.rooms.find(function(r) { return r.id === roomId; });
      if (!room) return;
      state.currentRoom = room;
      state.currentIndex = 0;
      document.getElementById('lamp-header-title').textContent = room.name;
      renderLamps(room.lights, 0);
      initLampGestures();
      showView('lamps');
    }

    document.getElementById('back-btn').addEventListener('click', function() {
      showView('rooms');
    });

    function renderLamps(lights, currentIndex) {
      var carousel = document.getElementById('carousel');
      var dots = document.getElementById('dots');

      var track = carousel.querySelector('.carousel-track');
      if (!track) {
        track = document.createElement('div');
        track.className = 'carousel-track';
        carousel.appendChild(track);
      }
      trackEl = track;

      track.innerHTML = lights.map(function(lamp) {
        var pct = Math.round((lamp.bri / 254) * 100);
        var isOff = !lamp.on || lamp.bri === 0;
        return '<div class="lamp-screen' + (isOff ? ' off' : '') + '" data-id="' + lamp.id + '">' +
          '<div class="brightness-bar" style="height: ' + (isOff ? 0 : pct) + '%"></div>' +
          '<div class="lamp-name">' + lamp.name + '</div>' +
          '<div class="brightness-text">' + (isOff ? 'OFF' : pct + '%') + '</div>' +
          '</div>';
      }).join('');

      dots.innerHTML = lights.map(function(_, i) {
        return '<div class="dot' + (i === currentIndex ? ' active' : '') + '"></div>';
      }).join('');

      setCarouselPosition(currentIndex, false);
    }

    function updateLamp(index, lamp) {
      if (!trackEl) return;
      var screen = trackEl.children[index];
      if (!screen) return;
      var pct = Math.round((lamp.bri / 254) * 100);
      var isOff = !lamp.on || lamp.bri === 0;
      screen.className = 'lamp-screen' + (isOff ? ' off' : '');
      screen.querySelector('.brightness-bar').style.height = (isOff ? 0 : pct) + '%';
      screen.querySelector('.brightness-text').textContent = isOff ? 'OFF' : pct + '%';
    }

    function updateDots(currentIndex) {
      var dots = document.getElementById('dots').children;
      for (var i = 0; i < dots.length; i++) {
        dots[i].classList.toggle('active', i === currentIndex);
      }
    }

    function setCarouselPosition(index, animate) {
      if (!trackEl) return;
      if (animate) {
        trackEl.classList.remove('dragging');
      } else {
        trackEl.classList.add('dragging');
        requestAnimationFrame(function() { trackEl.classList.remove('dragging'); });
      }
      trackEl.style.transform = 'translateX(-' + (index * 100) + '%)';
    }

    function setCarouselOffset(index, pxOffset) {
      if (!trackEl) return;
      trackEl.classList.add('dragging');
      var base = -index * trackEl.parentElement.offsetWidth;
      trackEl.style.transform = 'translateX(' + (base + pxOffset) + 'px)';
    }

    function snapCarousel(index) {
      if (!trackEl) return;
      trackEl.classList.remove('dragging');
      trackEl.style.transform = 'translateX(-' + (index * 100) + '%)';
    }

    // ===== swipe engine =====
    function initSwipe(el, callbacks) {
      var LOCK_THRESHOLD = 10;
      var SNAP_THRESHOLD = 0.3;
      var THROTTLE_MS = 100;

      var startX, startY, deltaX, deltaY;
      var axis = null;
      var lastApiCall = 0;
      var pointerId = null;

      el.addEventListener('pointerdown', function(e) {
        if (pointerId !== null) return;
        pointerId = e.pointerId;
        el.setPointerCapture(e.pointerId);
        startX = e.clientX;
        startY = e.clientY;
        deltaX = 0;
        deltaY = 0;
        axis = null;
      });

      el.addEventListener('pointermove', function(e) {
        if (e.pointerId !== pointerId) return;
        deltaX = e.clientX - startX;
        deltaY = e.clientY - startY;

        if (!axis) {
          if (Math.abs(deltaX) > LOCK_THRESHOLD) axis = 'x';
          else if (Math.abs(deltaY) > LOCK_THRESHOLD) {
            axis = 'y';
            callbacks.onBrightnessStart();
          }
          else return;
        }

        if (axis === 'y') {
          var screenH = el.offsetHeight;
          var briDelta = -deltaY / screenH;
          var now = Date.now();
          var throttled = (now - lastApiCall) >= THROTTLE_MS;
          callbacks.onBrightnessChange(briDelta, throttled);
          if (throttled) lastApiCall = now;
        } else {
          callbacks.onSwipeLamp(deltaX, false);
        }
      });

      function endHandler(e) {
        if (e.pointerId !== pointerId) return;
        pointerId = null;

        if (axis === 'y') {
          callbacks.onBrightnessEnd();
        } else if (axis === 'x') {
          var screenW = el.offsetWidth;
          var fraction = deltaX / screenW;
          var count = callbacks.getLampCount();
          var cur = callbacks.getCurrentIndex();
          var newIndex = cur;
          if (fraction < -SNAP_THRESHOLD && cur < count - 1) newIndex = cur + 1;
          else if (fraction > SNAP_THRESHOLD && cur > 0) newIndex = cur - 1;
          callbacks.onSwipeLamp(0, true, newIndex);
        }
        axis = null;
      }

      el.addEventListener('pointerup', endHandler);
      el.addEventListener('pointercancel', endHandler);
    }

    function initLampGestures() {
      var carousel = document.getElementById('carousel');
      // Remove old listeners by replacing the element
      var newCarousel = carousel.cloneNode(true);
      carousel.parentNode.replaceChild(newCarousel, carousel);
      trackEl = newCarousel.querySelector('.carousel-track');

      initSwipe(newCarousel, {
        onBrightnessStart: function() {
          var lamp = state.currentRoom.lights[state.currentIndex];
          state.startBri = lamp ? (lamp.on ? lamp.bri : 0) : 0;
        },
        onBrightnessChange: function(briDelta, sendApi) {
          var lamp = state.currentRoom.lights[state.currentIndex];
          if (!lamp) return;
          var newBri = Math.round(Math.min(254, Math.max(0, state.startBri + briDelta * 254)));
          lamp.bri = newBri;
          lamp.on = newBri > 0;
          updateLamp(state.currentIndex, lamp);
          if (sendApi) setLightBrightness(lamp.id, newBri);
        },
        onBrightnessEnd: function() {
          var lamp = state.currentRoom.lights[state.currentIndex];
          if (!lamp) return;
          setLightBrightness(lamp.id, lamp.bri);
          // Update room's average brightness
          syncRoomBri(state.currentRoom);
          updateRoomCard(state.currentRoom.id);
        },
        onSwipeLamp: function(pxOffset, snap, newIndex) {
          if (snap) {
            state.currentIndex = newIndex;
            snapCarousel(newIndex);
            updateDots(newIndex);
          } else {
            setCarouselOffset(state.currentIndex, pxOffset);
          }
        },
        getLampCount: function() { return state.currentRoom.lights.length; },
        getCurrentIndex: function() { return state.currentIndex; },
      });
    }

    function syncRoomBri(room) {
      var onLights = room.lights.filter(function(l) { return l.on; });
      if (onLights.length > 0) {
        room.bri = Math.round(onLights.reduce(function(s, l) { return s + l.bri; }, 0) / onLights.length);
        room.on = true;
      } else {
        room.bri = 0;
        room.on = false;
      }
    }

    // ===== onboarding =====
    var onboardingEl = document.getElementById('onboarding');
    var statusEl = document.getElementById('onboard-status');
    var manualIpInput = document.getElementById('manual-ip');
    var manualIpBtn = document.getElementById('manual-ip-btn');
    var certStepEl = document.getElementById('cert-step');
    var certLinkEl = document.getElementById('cert-link');

    function sleep(ms) {
      return new Promise(function(r) { setTimeout(r, ms); });
    }

    function showCertStep(ip) {
      certLinkEl.href = 'https://' + ip + '/';
      certStepEl.style.display = 'block';
    }

    async function startOnboarding() {
      onboardingEl.classList.remove('hidden');
      statusEl.textContent = 'Searching for bridge...';
      var ip = await discoverBridge();
      if (ip) {
        manualIpInput.value = ip;
        statusEl.textContent = 'Found bridge at ' + ip + '. Accept the certificate below, then press Connect.';
        showCertStep(ip);
      } else {
        statusEl.textContent = 'Could not find bridge automatically. Enter IP below.';
      }
    }

    manualIpBtn.addEventListener('click', function() {
      var ip = manualIpInput.value.trim();
      if (ip) {
        showCertStep(ip);
        statusEl.textContent = 'Connecting to ' + ip + '... Press the link button on the bridge.';
        tryAuth(ip);
      }
    });

    async function tryAuth(ip) {
      var attempts = 0;
      var maxAttempts = 30;
      while (attempts < maxAttempts) {
        try {
          var username = await authenticate(ip);
          state.bridgeIp = ip;
          state.username = username;
          onboardingEl.classList.add('hidden');
          await loadAndRender();
          startPolling();
          return;
        } catch (e) {
          if (e.message === 'LINK_BUTTON') {
            statusEl.textContent = 'Press the link button on your bridge... (' + (maxAttempts - attempts) + 's)';
            await sleep(1000);
            attempts++;
          } else {
            statusEl.textContent = 'Error: ' + e.message;
            return;
          }
        }
      }
      statusEl.textContent = 'Timed out. Please try again.';
    }

    // ===== main =====
    async function loadAndRender() {
      state.rooms = await getRooms();
      renderRooms();
      showView('rooms');
    }

    var sliding = false; // true while user is dragging a room slider

    function startPolling() {
      setInterval(async function() {
        if (sliding) return; // don't update state while user is dragging
        try {
          var fresh = await getRooms();
          state.rooms = fresh;
          if (state.currentView === 'rooms') {
            // Update cards in-place instead of rebuilding
            fresh.forEach(function(room) { updateRoomCard(room.id); });
          } else if (state.currentRoom) {
            var freshRoom = fresh.find(function(r) { return r.id === state.currentRoom.id; });
            if (freshRoom) {
              state.currentRoom = freshRoom;
              freshRoom.lights.forEach(function(l, i) { updateLamp(i, l); });
            }
          }
        } catch (e) {}
      }, 5000);
    }

    async function init() {
      var creds = getSavedCredentials();
      if (creds) {
        state.bridgeIp = creds.bridgeIp;
        state.username = creds.username;
        try {
          await loadAndRender();
          startPolling();
          return;
        } catch (e) {
          if (e.message === 'NETWORK_ERROR') {
            // Bridge unreachable — keep credentials, retry via polling
            showView('rooms');
            startPolling();
            return;
          }
          // Actual auth error — clear and re-onboard
          clearCredentials();
        }
      }
      startOnboarding();
    }

    // ===== service worker =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    init();
  </script>
</body>
</html>
